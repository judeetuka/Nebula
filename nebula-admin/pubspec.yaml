name: nebula_admin
description: "NEBULA Admin — Cross-platform cluster dashboard"
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_riverpod: ^2.5.1
  nebula_ui:
    path: ../shared/nebula_ui
  firebase_core: ^3.8.1
  firebase_auth: ^5.3.4
  http: ^1.2.0
  qr_flutter: ^4.1.0
  hive_ce: ^2.6.0
  hive_ce_flutter: ^2.3.4
  fl_chart: ^0.69.0
  web_socket_channel: ^3.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
