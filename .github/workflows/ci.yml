name: CI

on:
  push:
    branches: [release, release/*]
    tags: ['v*']
  pull_request:
    branches: [release, main]

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    name: cargo check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo check --workspace

  test:
    name: cargo test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo test --workspace

  build-release:
    name: build release
    runs-on: ubuntu-latest
    needs: [check, test]
    # Only build release artifacts on version tags or release branch pushes
    if: github.event_name == 'push' && (startsWith(github.ref, 'refs/tags/v') || startsWith(github.ref, 'refs/heads/release'))
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo build --release -p nebula-server
      - uses: actions/upload-artifact@v4
        with:
          name: nebula-server-${{ github.ref_name }}
          path: target/release/nebula-server
          retention-days: 30
