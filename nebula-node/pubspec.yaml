name: nebula_node
description: "NEBULA Node — Android compute node software"
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_riverpod: ^2.5.1
  rust_lib_nebula:
    path: rust_builder
  flutter_rust_bridge: 2.11.1
  manny_ui:
    path: ../shared/manny_ui
  webview_flutter: ^4.13.0
  shared_preferences: ^2.3.4
  mobile_scanner: ^6.0.0
  permission_handler: ^11.0.0
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.13
  freezed: ^2.5.8
  json_serializable: ^6.9.4

flutter:
  uses-material-design: true
